openapi: 3.1.0
info:
  title: GARD — F7 NetBox Integration (Read-Only)
  version: "0.7.0"
  description: |
    Read-only NetBox REST sync: pull DCIM devices, reconcile to GARD Device rows,
    populate tags for F2 `tagged_with` evaluation. No NetBox writes in v1.

servers:
  - url: /api/v1
    description: GARD API root

paths:
  /integrations/netbox/sync:
    post:
      summary: Trigger a NetBox sync run
      operationId: triggerNetboxSync
      description: |
        Pages NetBox `/api/dcim/devices/`, reconciles to GARD Device rows in a
        single transaction. On NetBox failure, rolls back all mutations.
      responses:
        "200":
          description: Sync completed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NetboxSyncEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Ambiguous NetBox identity (duplicate serial)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "502":
          description: NetBox unreachable or unrecoverable API error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /integrations/netbox/summary:
    get:
      summary: NetBox linkage summary counts
      operationId: getNetboxSyncSummary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NetboxSummaryEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /integrations/netbox/sync-runs:
    get:
      summary: List NetBox sync runs (paginated)
      operationId: listNetboxSyncRuns
      parameters:
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { name: page_token, in: query, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NetboxSyncRunList" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /integrations/netbox/sync-runs/{run_id}:
    get:
      summary: Get a single NetBox sync run
      operationId: getNetboxSyncRun
      parameters:
        - { name: run_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NetboxSyncRunEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  responses:
    Unauthorized:
      description: Missing or invalid auth
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Forbidden:
      description: Insufficient permission
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - NETBOX_UNREACHABLE
                - NETBOX_AMBIGUOUS_IDENTITY
                - NETBOX_NOT_CONFIGURED
                - FORBIDDEN
                - NOT_FOUND
            message: { type: string }
            details: { type: object, additionalProperties: true }

    NetboxSyncReport:
      type: object
      required: [matched_count, created_count, updated_count, orphaned_count]
      properties:
        matched_count: { type: integer, minimum: 0 }
        created_count: { type: integer, minimum: 0 }
        updated_count: { type: integer, minimum: 0 }
        orphaned_count: { type: integer, minimum: 0 }
        orphaned_in_gard:
          type: array
          items: { $ref: "#/components/schemas/OrphanedDevice" }
        errors:
          type: array
          items: { $ref: "#/components/schemas/SyncError" }

    OrphanedDevice:
      type: object
      required: [device_id, hostname, reason]
      properties:
        device_id: { type: string, format: uuid }
        hostname: { type: string }
        serial_number: { type: string, nullable: true }
        site: { type: string, nullable: true }
        reason: { type: string }

    SyncError:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        netbox_device_id: { type: integer, nullable: true }

    NetboxSyncRun:
      type: object
      required: [id, status, started_at, correlation_id]
      properties:
        id: { type: string, format: uuid }
        status:
          type: string
          enum: [running, completed, failed]
        started_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time, nullable: true }
        correlation_id: { type: string }
        matched_count: { type: integer, minimum: 0 }
        created_count: { type: integer, minimum: 0 }
        updated_count: { type: integer, minimum: 0 }
        orphaned_count: { type: integer, minimum: 0 }
        error_summary: { type: string, nullable: true }

    NetboxSyncEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [run, report]
          properties:
            run: { $ref: "#/components/schemas/NetboxSyncRun" }
            report: { $ref: "#/components/schemas/NetboxSyncReport" }

    NetboxSummary:
      type: object
      required: [netbox_linked, csv_only, orphaned_in_gard, last_sync_at]
      properties:
        netbox_linked: { type: integer, minimum: 0 }
        csv_only: { type: integer, minimum: 0 }
        orphaned_in_gard: { type: integer, minimum: 0 }
        last_sync_at: { type: string, format: date-time, nullable: true }

    NetboxSummaryEnvelope:
      type: object
      required: [data]
      properties:
        data: { $ref: "#/components/schemas/NetboxSummary" }

    NetboxSyncRunEnvelope:
      type: object
      required: [data]
      properties:
        data: { $ref: "#/components/schemas/NetboxSyncRun" }

    NetboxSyncRunList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/NetboxSyncRun" }
        pagination:
          type: object
          properties:
            next_page_token: { type: string, nullable: true }
