openapi: 3.1.0
info:
  title: GARD — F12 NetBox IPAM Alignment (extends F7/F10)
  version: "0.12.0"
  description: |
    Extends NetBox sync with post-reconcile IPAM/DCIM alignment phase.
    Pull and write-back phases unchanged except pipeline ordering:
    pull → align → write-back.

servers:
  - url: /api/v1
    description: GARD API root

paths:
  /integrations/netbox/sync:
    post:
      summary: Trigger NetBox sync with IPAM alignment
      operationId: triggerNetboxSyncWithAlignment
      description: |
        Phase 1 (F7): DCIM device pull + reconcile.
        Phase 2 (F12): IPAM/overlay alignment for linked devices.
        Phase 3 (F10): Lifecycle write-back when enabled.
      responses:
        "200":
          description: Pull succeeded; alignment and write-back outcomes in body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetboxSyncFullEnvelope"

  /integrations/netbox/alignment/findings:
    get:
      summary: List IPAM alignment findings
      operationId: listIpamAlignmentFindings
      parameters:
        - name: run_id
          in: query
          schema: { type: string, format: uuid }
        - name: device_id
          in: query
          schema: { type: string, format: uuid }
        - name: severity
          in: query
          schema:
            type: string
            enum: [error, warning, info]
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
        - name: page_token
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Paginated findings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IpamAlignmentFindingList"

  /devices/{device_id}/network-context:
    get:
      summary: Latest network context snapshot for device
      operationId: getDeviceNetworkContext
      parameters:
        - name: device_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Network context from latest alignment run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceNetworkContextOut"
        "404":
          description: Device not found or no alignment snapshot

components:
  schemas:
    IpamAlignmentSummary:
      type: object
      required:
        - devices_checked
        - aligned_count
        - mismatch_count
        - error_count
        - warning_count
        - info_count
      properties:
        devices_checked: { type: integer, minimum: 0 }
        aligned_count: { type: integer, minimum: 0 }
        mismatch_count: { type: integer, minimum: 0 }
        error_count: { type: integer, minimum: 0 }
        warning_count: { type: integer, minimum: 0 }
        info_count: { type: integer, minimum: 0 }
        findings_by_kind:
          type: object
          additionalProperties: { type: integer, minimum: 0 }
        l2vpn_available: { type: boolean }

    IpamAlignmentEntry:
      type: object
      required: [device_id, netbox_device_id, overall_status, finding_count]
      properties:
        device_id: { type: string, format: uuid }
        netbox_device_id: { type: integer }
        overall_status:
          type: string
          enum: [aligned, mismatch, unknown]
        finding_count: { type: integer, minimum: 0 }
        top_kinds:
          type: array
          maxItems: 3
          items: { type: string }

    IpamAlignmentReport:
      type: object
      required: [phase, summary, run_id]
      properties:
        phase:
          type: string
          enum: [completed, partial, failed, skipped]
        run_id: { type: string, format: uuid }
        summary:
          $ref: "#/components/schemas/IpamAlignmentSummary"
        entries:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/IpamAlignmentEntry"

    NetboxSyncFullEnvelope:
      type: object
      description: F7 sync envelope extended with ipam_alignment block
      properties:
        ipam_alignment:
          $ref: "#/components/schemas/IpamAlignmentReport"

    IpamAlignmentFindingOut:
      type: object
      required: [id, kind, severity, status, created_at]
      properties:
        id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        device_id: { type: string, format: uuid }
        kind: { type: string }
        severity:
          type: string
          enum: [error, warning, info]
        status:
          type: string
          enum: [open, pass]
        interface_name: { type: string, nullable: true }
        netbox_observed: { type: object }
        gard_observed: { type: object }
        remediation_hint: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    IpamAlignmentFindingList:
      type: object
      required: [items, total_returned]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/IpamAlignmentFindingOut"
        total_returned: { type: integer }
        next_page_token: { type: string, nullable: true }

    DeviceNetworkContextOut:
      type: object
      required: [device_id, netbox_device_id, captured_at, interfaces]
      properties:
        device_id: { type: string, format: uuid }
        netbox_device_id: { type: integer }
        resolved_mgmt_ip: { type: string, nullable: true }
        mgmt_resolution_method: { type: string, nullable: true }
        primary_ip4: { type: string, nullable: true }
        primary_ip6: { type: string, nullable: true }
        interfaces: { type: array, items: { type: object } }
        overlay_bindings: { type: array, items: { type: object } }
        captured_at: { type: string, format: date-time }
