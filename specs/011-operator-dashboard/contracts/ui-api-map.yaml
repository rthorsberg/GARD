# GARD Operator Portal — API Surface Map

**Feature**: F11 `011-operator-dashboard` | **Version**: 0.11.0

Maps UI screens to existing GARD REST endpoints. The UI MUST NOT call endpoints outside this map without a spec/plan amendment.

## Authentication

| UI need | Method | Path | Permission |
|---------|--------|------|------------|
| Health check | GET | `/healthz` | none |
| Issue token (external) | POST | `/api/v1/admin/tokens` | `token.manage` |

Sign-in stores JWT from operator-provided token or pre-issued lab file.

## Dashboard

| UI need | Method | Path | Permission |
|---------|--------|------|------------|
| Compliance aggregates | GET | `/api/v1/compliance/summary` | `compliance.read` |
| Readiness aggregates | GET | `/api/v1/readiness/summary` | `readiness.read` |
| NetBox linkage | GET | `/api/v1/integrations/netbox/summary` | `netbox.read` |
| Recent activity | GET | `/api/v1/audit?limit=10` | `audit.read` |

## Devices

| UI need | Method | Path | Permission |
|---------|--------|------|------------|
| List with compliance | GET | `/api/v1/compliance/devices` | `compliance.read` |
| Generic list | GET | `/api/v1/devices` | `device.list` |
| Detail | GET | `/api/v1/devices/{id}` | `device.read` |
| Compliance detail | GET | `/api/v1/devices/{id}/compliance` | `compliance.read` |
| Readiness detail | GET | `/api/v1/devices/{id}/readiness` | `readiness.read` |

Query params: `limit`, `page_token`, `site`, `region`, `vendor_normalized`, `compliance_state` (compliance list).

