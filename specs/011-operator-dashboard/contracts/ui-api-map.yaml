| UI need | Method | Path | Permission |
|---------|--------|------|------------|
| Trigger compliance eval | POST | `/api/v1/compliance/evaluate` | `compliance.evaluate` |
| Trigger readiness eval | POST | `/api/v1/readiness/evaluate` | `readiness.evaluate` |

