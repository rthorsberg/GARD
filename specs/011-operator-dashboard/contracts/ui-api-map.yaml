## NetBox

| UI need | Method | Path | Permission |
|---------|--------|------|------------|
| Trigger sync + write-back | POST | `/api/v1/integrations/netbox/sync?confirm_writeback={bool}` | `netbox.sync` |
| List sync runs | GET | `/api/v1/integrations/netbox/sync-runs?limit=20` | `netbox.read` |
| Sync run detail | GET | `/api/v1/integrations/netbox/sync-runs/{run_id}` | `netbox.read` |

