## OpenAPI reference

Authoritative schema: `{GARD_BASE}/openapi.json` served by FastAPI.

F11 contract tests SHOULD snapshot subset responses under `web/src/api/__fixtures__/`.

## Headers

All authenticated requests:

```http
Authorization: Bearer <jwt>
Accept: application/json
```

Optional correlation (if GARD middleware accepts):

```http
X-Correlation-ID: <uuid>
```
