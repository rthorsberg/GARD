$schema: https://json-schema.org/draft/2020-12/schema
$id: https://gard.local/schemas/platform-lab/lab-stack-manifest.schema.json
title: GARD NetBox Platform Lab Stack Manifest
description: Declarative lab topology for F13 (deploy artefacts only)
type: object
required:
  - schema_version
  - project_name
  - compose_files
  - ports
  - services
additionalProperties: false
properties:
  schema_version:
    type: string
    const: "1"
  project_name:
    type: string
    const: gard-f7-netbox
  compose_files:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  ports:
    type: array
    items:
      type: object
      required: [name, host_port, container_port, override_env]
      additionalProperties: false
      properties:
        name:
          type: string
        host_port:
          type: integer
          minimum: 1
          maximum: 65535
        container_port:
          type: integer
          minimum: 1
          maximum: 65535
        override_env:
          type: string
        description:
          type: string
  services:
    type: array
    minItems: 1
    items:
      type: object
      required: [name, role, required]
      additionalProperties: false
      properties:
        name:
          type: string
        role:
          type: string
          enum: [netbox, diode, orb, simulator, datastore]
        required:
          type: boolean
        health_probe:
          type: string
  branching:
    type: object
    additionalProperties: false
    properties:
      enabled_env:
        type: string
      plugin_name:
        type: string
        const: netbox_branching
  diode:
    type: object
    additionalProperties: false
    properties:
      netbox_plugin_api_base_url:
        type: string
        description: Must be reachable from diode-reconciler container (Docker DNS)
      grpc_target:
        type: string
