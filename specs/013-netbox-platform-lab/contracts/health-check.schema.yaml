$schema: https://json-schema.org/draft/2020-12/schema
$id: https://gard.local/schemas/platform-lab/health-check.schema.json
title: GARD Platform Lab Health Check Report
description: JSON output contract for deploy/scripts/platform-lab-health.sh
type: object
required:
  - status
  - checks
  - branching_enabled
additionalProperties: false
properties:
  status:
    type: string
    enum: [healthy, degraded, unhealthy]
  branching_enabled:
    type: boolean
  checks:
    type: array
    minItems: 1
    items:
      type: object
      required: [name, ok]
      additionalProperties: false
      properties:
        name:
          type: string
          enum:
            - netbox_ui
            - netbox_worker
            - diode_grpc
            - orb_agent
            - netbox_diode_plugin
            - branching_plugin
        ok:
          type: boolean
        detail:
          type: string
