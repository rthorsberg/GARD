$schema: https://json-schema.org/draft/2020-12/schema
$id: https://gard.local/schemas/platform-lab/ingest-fixture-catalogue.schema.json
title: GARD Platform Lab Ingest Fixture Catalogue
description: Expected NetBox devices after Orb → Diode ingest smoke
type: object
required:
  - schema_version
  - minimum_device_count
  - devices
additionalProperties: false
properties:
  schema_version:
    type: string
    const: "1"
  minimum_device_count:
    type: integer
    minimum: 3
  idempotency_notes:
    type: string
  devices:
    type: array
    minItems: 3
    items:
      type: object
      required:
        - name
        - site
        - role
        - device_type
        - simulator_ip
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
        site:
          type: string
          minLength: 1
        role:
          type: string
          minLength: 1
        device_type:
          type: string
          minLength: 1
        serial:
          type: string
        simulator_ip:
          type: string
          format: ipv4
        expected_primary_ip:
          type: string
          pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$'
