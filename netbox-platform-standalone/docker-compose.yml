# NetBox + Diode + Orb (+ optional Branching). Project: netbox-platform
#
#   cp .env.example .env && ./scripts/start.sh
#
# Lab simulators (fake routers):  docker compose --profile lab ...

name: netbox-platform

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: netbox
      POSTGRES_USER: netbox
      POSTGRES_PASSWORD: ${NETBOX_DB_PASSWORD:-netbox-dev-password}
    ports:
      - "${NETBOX_PG_HOST_PORT:-55432}:5432"
    volumes:
      - netbox-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netbox -d netbox"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - netbox-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  netbox:
    build:
      context: .
      dockerfile: Dockerfile.plugins
      args:
        NETBOX_BRANCHING_ENABLED: ${NETBOX_BRANCHING_ENABLED:-0}
    image: netbox-platform:dev
    pull_policy: never
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${NETBOX_HOST_PORT:-18888}:8080"
    volumes:
      - ./configuration/plugins.py:/etc/netbox/config/plugins.py:ro
    environment:
      SUPERUSER_NAME: ${NETBOX_SUPERUSER_NAME:-admin}
      SUPERUSER_EMAIL: ${NETBOX_SUPERUSER_EMAIL:-admin@example.com}
      SUPERUSER_PASSWORD: ${NETBOX_SUPERUSER_PASSWORD:-change-me}
      API_TOKEN_PEPPER_1: ${NETBOX_API_TOKEN_PEPPER_1:-change-me-pepper-minimum-fifty-characters-for-v2-tokens}
      ALLOWED_HOSTS: "*"
      DB_HOST: postgres
      DB_NAME: netbox
      DB_USER: netbox
      DB_PASSWORD: ${NETBOX_DB_PASSWORD:-netbox-dev-password}
      REDIS_HOST: redis
      REDIS_CACHE_HOST: redis
      SECRET_KEY: ${NETBOX_SECRET_KEY:-change-me-secret-key}
      DIODE_GRPC_TARGET: ${DIODE_GRPC_TARGET:-grpc://diode-nginx:80/diode}
      NETBOX_TO_DIODE_CLIENT_SECRET: ${NETBOX_TO_DIODE_CLIENT_SECRET:-}
      NETBOX_BRANCHING_ENABLED: ${NETBOX_BRANCHING_ENABLED:-0}
      DIODE_NETBOX_USERNAME: ${DIODE_NETBOX_USERNAME:-diode}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/login/"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 90s
    networks:
      - default
      - platform

  netbox-worker:
    image: netbox-platform:dev
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile.plugins
      args:
        NETBOX_BRANCHING_ENABLED: ${NETBOX_BRANCHING_ENABLED:-0}
    depends_on:
      netbox:
        condition: service_healthy
    command: /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py rqworker
    volumes:
      - ./configuration/plugins.py:/etc/netbox/config/plugins.py:ro
    environment:
      DB_HOST: postgres
      DB_NAME: netbox
      DB_USER: netbox
      DB_PASSWORD: ${NETBOX_DB_PASSWORD:-netbox-dev-password}
      REDIS_HOST: redis
      REDIS_CACHE_HOST: redis
      SECRET_KEY: ${NETBOX_SECRET_KEY:-change-me-secret-key}
      DIODE_GRPC_TARGET: ${DIODE_GRPC_TARGET:-grpc://diode-nginx:80/diode}
      NETBOX_TO_DIODE_CLIENT_SECRET: ${NETBOX_TO_DIODE_CLIENT_SECRET:-}
      NETBOX_BRANCHING_ENABLED: ${NETBOX_BRANCHING_ENABLED:-0}
      DIODE_NETBOX_USERNAME: ${DIODE_NETBOX_USERNAME:-diode}
    networks:
      - default
      - platform

  diode-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DIODE_POSTGRES_SUPERUSER:-diode_admin}
      POSTGRES_PASSWORD: ${DIODE_POSTGRES_SUPERPASS:-diode-admin-dev-only}
      DIODE_POSTGRES_DB_NAME: ${DIODE_POSTGRES_DB_NAME:-diode}
      DIODE_POSTGRES_USER: ${DIODE_POSTGRES_USER:-diode}
      DIODE_POSTGRES_PASSWORD: ${DIODE_POSTGRES_PASSWORD:-diode-dev-only}
      HYDRA_POSTGRES_DB_NAME: ${HYDRA_POSTGRES_DB_NAME:-hydra}
      HYDRA_POSTGRES_USER: ${HYDRA_POSTGRES_USER:-hydra}
      HYDRA_POSTGRES_PASSWORD: ${HYDRA_POSTGRES_PASSWORD:-hydra-dev-only}
    volumes:
      - diode-postgres-data:/var/lib/postgresql/data
      - ./platform/diode/postgres-init.sh:/docker-entrypoint-initdb.d/01-init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DIODE_POSTGRES_USER:-diode} -d ${DIODE_POSTGRES_DB_NAME:-diode}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - platform

  diode-redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${DIODE_REDIS_PASSWORD:-diode-redis-dev}"]
    volumes:
      - diode-redis-data:/data
    networks:
      - platform

  hydra-migrate:
    image: oryd/hydra:v2.3.0
    command: migrate sql up -e --yes
    environment:
      DSN: postgres://${HYDRA_POSTGRES_USER:-hydra}:${HYDRA_POSTGRES_PASSWORD:-hydra-dev-only}@diode-postgres:5432/${HYDRA_POSTGRES_DB_NAME:-hydra}?sslmode=disable
      SECRETS_SYSTEM: ${HYDRA_SECRETS_SYSTEM:-change-me-hydra-dev-secret-min-16-chars}
    depends_on:
      diode-postgres:
        condition: service_healthy
    networks:
      - platform

  hydra:
    image: oryd/hydra:v2.3.0
    command: serve all --dev
    environment:
      DSN: postgres://${HYDRA_POSTGRES_USER:-hydra}:${HYDRA_POSTGRES_PASSWORD:-hydra-dev-only}@diode-postgres:5432/${HYDRA_POSTGRES_DB_NAME:-hydra}?sslmode=disable
      SECRETS_SYSTEM: ${HYDRA_SECRETS_SYSTEM:-change-me-hydra-dev-secret-min-16-chars}
      URLS_SELF_ISSUER: ${HYDRA_URLS_SELF_ISSUER:-http://hydra:4444}
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    networks:
      - platform

  diode-auth-bootstrap:
    image: netboxlabs/diode-auth:${DIODE_TAG:-latest}
    command: ["/bin/sh", "/etc/config/oauth2/bootstrap-clients.sh"]
    environment:
      HYDRA_ADMIN_URL: http://hydra:4445
    volumes:
      - ./platform/diode/oauth2/client:/etc/config/oauth2/client:ro
    depends_on:
      - hydra
    networks:
      - platform

  diode-auth:
    image: netboxlabs/diode-auth:${DIODE_TAG:-latest}
    environment:
      HTTP_PORT: "8080"
      OAUTH2_PUBLIC_SERVER_URL: ${OAUTH2_PUBLIC_SERVER_URL:-http://hydra:4444}
      OAUTH2_ADMIN_SERVER_URL: http://hydra:4445/
    depends_on:
      - hydra
      - diode-auth-bootstrap
    networks:
      - platform

  diode-reconciler:
    image: netboxlabs/diode-reconciler:${DIODE_TAG:-latest}
    environment:
      REDIS_PASSWORD: ${DIODE_REDIS_PASSWORD:-diode-redis-dev}
      REDIS_HOST: diode-redis
      REDIS_PORT: "6379"
      NETBOX_DIODE_PLUGIN_API_BASE_URL: ${NETBOX_DIODE_PLUGIN_API_BASE_URL:-http://netbox:8080}
      NETBOX_DIODE_PLUGIN_SKIP_TLS_VERIFY: "true"
      POSTGRES_HOST: diode-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB_NAME: ${DIODE_POSTGRES_DB_NAME:-diode}
      POSTGRES_USER: ${DIODE_POSTGRES_USER:-diode}
      POSTGRES_PASSWORD: ${DIODE_POSTGRES_PASSWORD:-diode-dev-only}
      DIODE_AUTH_TOKEN_URL: ${DIODE_AUTH_TOKEN_URL:-http://diode-auth:8080/token}
      DIODE_TO_NETBOX_CLIENT_ID: ${DIODE_TO_NETBOX_CLIENT_ID:-diode-to-netbox}
      DIODE_TO_NETBOX_CLIENT_SECRET: ${DIODE_TO_NETBOX_CLIENT_SECRET:-}
    volumes:
      - ./platform/diode/oauth2/client:/etc/config/oauth2/client:ro
    depends_on:
      diode-postgres:
        condition: service_healthy
      diode-redis:
        condition: service_started
      netbox:
        condition: service_healthy
    networks:
      - default
      - platform

  diode-ingester:
    image: netboxlabs/diode-ingester:${DIODE_TAG:-latest}
    environment:
      REDIS_PASSWORD: ${DIODE_REDIS_PASSWORD:-diode-redis-dev}
      REDIS_HOST: diode-redis
      REDIS_PORT: "6379"
    depends_on:
      - diode-redis
      - diode-reconciler
    networks:
      - platform

  diode-nginx:
    image: nginx:1.27-alpine
    ports:
      - "${DIODE_GRPC_HOST_PORT:-58080}:80"
    volumes:
      - ./platform/diode/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - diode-auth
      - diode-ingester
      - diode-reconciler
    networks:
      - platform

  orb-agent:
    image: netboxlabs/orb-agent:latest
    restart: unless-stopped
    cap_add:
      - NET_RAW
    environment:
      DIODE_CLIENT_ID: ${DIODE_CLIENT_ID:-}
      DIODE_CLIENT_SECRET: ${DIODE_CLIENT_SECRET:-}
    volumes:
      - ./platform/orb/agent.yaml:/opt/orb/agent.yaml:ro
    command: ["run", "-c", "/opt/orb/agent.yaml"]
    depends_on:
      - diode-nginx
    networks:
      - platform

  lab-sim-1:
    profiles: [lab]
    image: alpine:3.20
    hostname: lab-router-01
    command: ["sleep", "infinity"]
    networks:
      platform:
        ipv4_address: 172.30.77.11

  lab-sim-2:
    profiles: [lab]
    image: alpine:3.20
    hostname: lab-router-02
    command: ["sleep", "infinity"]
    networks:
      platform:
        ipv4_address: 172.30.77.12

  lab-sim-3:
    profiles: [lab]
    image: alpine:3.20
    hostname: lab-router-03
    command: ["sleep", "infinity"]
    networks:
      platform:
        ipv4_address: 172.30.77.13

networks:
  platform:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.77.0/24

volumes:
  netbox-postgres-data: {}
  netbox-redis-data: {}
  diode-postgres-data: {}
  diode-redis-data: {}
