services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gard
      POSTGRES_PASSWORD: gard
      POSTGRES_DB: gard
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gard -d gard"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - gard-pg:/var/lib/postgresql/data

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: gard-api:dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GARD_ENV: dev
      GARD_DATABASE_URL: postgresql+psycopg://gard:gard@postgres:5432/gard
      GARD_REQUIRE_TLS: "false"
      GARD_JWT_SECRET: dev-secret-change-me
    command: ["migrate"]
    restart: "no"

  api:
    image: gard-api:dev
    pull_policy: never
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      GARD_ENV: dev
      GARD_DATABASE_URL: postgresql+psycopg://gard:gard@postgres:5432/gard
      GARD_REQUIRE_TLS: "false"
      GARD_JWT_SECRET: dev-secret-change-me
      GARD_LOG_LEVEL: DEBUG
      GARD_BLOB_ROOT: /var/lib/gard/blobs
      GARD_FIRMWARE_BLOB_MAX_BYTES: "5368709120"
      # F7: read NetBox from host-mapped dev stack (port 18888). Set token via env file or shell.
      GARD_NETBOX_URL: ${GARD_NETBOX_URL:-http://host.docker.internal:18888}
      GARD_NETBOX_TOKEN: ${GARD_NETBOX_TOKEN:-}
      GARD_NETBOX_WRITE_TOKEN: ${GARD_NETBOX_WRITE_TOKEN:-}
      GARD_NETBOX_WRITEBACK_ENABLED: ${GARD_NETBOX_WRITEBACK_ENABLED:-true}
      GARD_NETBOX_VERIFY_TLS: ${GARD_NETBOX_VERIFY_TLS:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${GARD_API_HOST_PORT:-8080}:8000"
    command: ["serve"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s
    volumes:
      - gard-blobs:/var/lib/gard/blobs

volumes:
  gard-pg: {}
  gard-blobs: {}
