idempotency_notes: |
  Re-running ingest smoke may upsert the same device names via Diode reconciler.
  The smoke script passes when catalogue names remain present on main; duplicate
  creates are not expected. If counts drop, inspect diode-reconciler logs and
  restart orb-agent after fixing DIODE_CLIENT_* credentials.

